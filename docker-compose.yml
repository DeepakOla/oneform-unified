version: "3.9"

# OneForm Unified Platform — Local Development Services
# Uses latest versions: PostgreSQL 17, Redis 8.6
#
# Usage:
#   Start:  pnpm db:start
#   Stop:   pnpm db:stop
#   Logs:   docker-compose logs -f postgres | redis
#   Reset:  docker-compose down -v (WARNING: destroys all data)

services:
  postgres:
    image: postgres:17-alpine
    container_name: oneform_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneform_dev}
      POSTGRES_USER: ${POSTGRES_USER:-oneform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneform_dev_secret}
      # Enable pg_stat_statements for query performance monitoring
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneform} -d ${POSTGRES_DB:-oneform_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=128MB
        -c work_mem=16MB
        -c wal_buffers=16MB
        -c log_statement=all
        -c log_min_duration_statement=500
        -c enable_seqscan=on

  redis:
    image: redis:8.0-alpine
    container_name: oneform_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./scripts/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Redis Insight (Web UI for Redis 8 — http://localhost:8001)
  redis-insight:
    image: redis/redisinsight:latest
    container_name: oneform_redis_insight
    restart: unless-stopped
    ports:
      - "8001:5540"
    profiles:
      - tools
    depends_on:
      - redis

  # Optional: pgAdmin (http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oneform_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oneform.dev
      PGADMIN_DEFAULT_PASSWORD: oneform_admin
    profiles:
      - tools
    depends_on:
      - postgres

volumes:
  postgres_data:
    name: oneform_postgres_data
  redis_data:
    name: oneform_redis_data

networks:
  default:
    name: oneform_network
