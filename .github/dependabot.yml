version: 2
updates:
  # Root + all workspace packages use pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      prisma:
        patterns: ["prisma", "@prisma/*"]
      radix:
        patterns: ["@radix-ui/*"]
      aws-sdk:
        patterns: ["@aws-sdk/*"]
      tanstack:
        patterns: ["@tanstack/*"]
    ignore:
      # Turbo major versions need manual review
      - dependency-name: "turbo"
        update-types: ["version-update:semver-major"]
      # Prisma v7 has breaking changes (datasource.url removed from schema)
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]
      # jose v6 has breaking API changes
      - dependency-name: "jose"
        update-types: ["version-update:semver-major"]
      # @types/node major bumps can break TS compilation
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      # actions/checkout@v4 is the latest — v5/v6 don't exist
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
