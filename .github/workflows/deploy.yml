name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy-frontend:
    name: Deploy Web App to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @oneform/api exec prisma generate

      - name: Build shared packages
        run: pnpm --filter @oneform/shared-types build && pnpm --filter @oneform/validation build

      - name: Build Web App
        run: pnpm --filter @oneform/web run build
        env:
          # Production API URL — set VITE_API_URL secret in GitHub repo settings
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=oneform-unified-web --branch=main
