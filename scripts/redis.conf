# Redis 8 configuration for OneForm local development
# Reference: https://redis.io/docs/manual/config/

# Network
bind 127.0.0.1
port 6379
protected-mode yes

# General
daemonize no
loglevel notice
logfile ""

# Persistence (for session durability in dev)
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfsync everysec

# Memory limit for local dev (256MB)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Redis 8 — enable new data structures (Query Engine)
enable-debug-command yes

# Keyspace notifications (for BullMQ job events)
notify-keyspace-events ""
